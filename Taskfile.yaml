version: "3"

tasks:
  ci:
    desc: "Validaciones base del repositorio devtools"
    cmds:
      - task lint:shell
      - task lint:contamination
      - bash -euo pipefail -c './scripts/gh-policy-check.sh'

  lint:shell:
    desc: "Chequea sintaxis bash en bin/ y lib/"
    cmds:
      - bash -euo pipefail -c 'mapfile -t files < <(find bin lib -type f | sort); [ "${#files[@]}" -gt 0 ] || exit 0; bash -n "${files[@]}"'

  lint:contamination:
    desc: "Evita acoplamiento del core a programas/rutas específicas"
    cmds:
      - bash -euo pipefail -c 'if rg -ni "(/webapps/ihh-ecosystem|pmbok|\\berd\\b|el-rincon|detective|\\bihexhubs\\b)" bin lib/core lib/apps lib/ci/detection.sh config/apps.yaml README.md; then echo "contaminacion detectada"; exit 1; fi'

  ci:act:
    desc: "Ejecuta CI local usando Act"
    cmds:
      - bash -euo pipefail -c 'command -v act >/dev/null 2>&1 || { echo "act no esta instalado"; exit 1; }'
      - bash -euo pipefail -c 'command -v docker >/dev/null 2>&1 || { echo "docker no esta instalado"; exit 1; }; ACT_IMAGE="${DEVTOOLS_ACT_IMAGE:-catthehacker/ubuntu:full-latest}"; if ! docker image inspect "${ACT_IMAGE}" >/dev/null 2>&1; then docker pull "${ACT_IMAGE}"; fi; act -W .github/workflows/ci.yaml -j ci --pull=false'

  apps:sync:
    desc: "Sincroniza apps declaradas en el registry de build"
    cmds:
      - bash -euo pipefail -c 'bin/devtools apps sync'

  apps:sync:dry:
    desc: "Dry run de sincronización de apps"
    cmds:
      - bash -euo pipefail -c 'DEVTOOLS_DRY_RUN=1 bin/devtools apps sync'
