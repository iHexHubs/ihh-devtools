version: "3"

tasks:
  ci:
    desc: "Validaciones base del repositorio devtools"
    cmds:
      - task lint:shell
      - task lint:contamination
      - bash -euo pipefail -c './scripts/gh-policy-check.sh'

  lint:shell:
    desc: "Chequea sintaxis bash en bin/ y lib/"
    cmds:
      - bash -euo pipefail -c 'mapfile -t files < <(find bin lib -type f | sort); [ "${#files[@]}" -gt 0 ] || exit 0; bash -n "${files[@]}"'

  lint:contamination:
    desc: "Detecta rutas hardcodeadas y referencias legacy no portables"
    cmds:
      - bash -euo pipefail -c 'PATTERN="(/webapps/|/home/|/Users/|\\.devtools/|github\\.com/|git@github\\.com:)"; TARGETS=(README.md CHANGELOG.md scripts devtools.repo.yaml); if grep -RniE "$PATTERN" "${TARGETS[@]}"; then echo "contaminacion detectada"; exit 1; fi'

  ci:act:
    desc: "Ejecuta CI local usando Act"
    cmds:
      - bash -euo pipefail -c 'WF=".github/workflows/ci.yaml"; if [ ! -f "$WF" ]; then echo "skip: $WF no existe"; exit 0; fi; if [ -z "${DEVTOOLS_ACT_IMAGE:-}" ]; then echo "skip: DEVTOOLS_ACT_IMAGE no definido"; exit 0; fi; command -v act >/dev/null 2>&1 || { echo "act no esta instalado"; exit 1; }; command -v docker >/dev/null 2>&1 || { echo "docker no esta instalado"; exit 1; }; if ! docker image inspect "${DEVTOOLS_ACT_IMAGE}" >/dev/null 2>&1; then echo "skip: imagen no disponible localmente (${DEVTOOLS_ACT_IMAGE})"; exit 0; fi; act -W "$WF" -j ci --pull=false -P ubuntu-latest="${DEVTOOLS_ACT_IMAGE}"'

  apps:sync:
    desc: "Sincroniza apps declaradas en el registry de build"
    cmds:
      - bash -euo pipefail -c 'bin/devtools apps sync'

  apps:sync:dry:
    desc: "Dry run de sincronización de apps"
    cmds:
      - bash -euo pipefail -c 'DEVTOOLS_DRY_RUN=1 bin/devtools apps sync'
