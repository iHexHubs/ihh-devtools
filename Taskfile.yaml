version: "3"

tasks:
  ci:
    desc: "Gate nativo base para el repo devtools"
    cmds:
      - bash -euo pipefail -c 'bash -n bin/devtools bin/git-ci.sh bin/git-promote.sh'
      - bash -euo pipefail -c './scripts/gh-policy-check.sh'

  ci:act:
    desc: "Ejecuta workflow de CI usando Act"
    cmds:
      - bash -euo pipefail -c 'command -v act >/dev/null 2>&1 || { echo "act no está instalado"; exit 1; }'
      - bash -euo pipefail -c 'act -W .github/workflows/ci.yaml -j ci --pull=false'

  ui:local:
    desc: "Abre K9s si está disponible"
    cmds:
      - bash -euo pipefail -c 'if command -v k9s >/dev/null 2>&1; then exec k9s; else echo "k9s no está instalado"; exit 1; fi'

  local:check:
    desc: "Pipeline local mínimo"
    cmds:
      - task ci

  app:devbox:ci:
    desc: "CI de devbox-app (backend pytest + frontend build)"
    cmds:
      - bash -euo pipefail -c 'cd devbox-app/backend && python3 -m venv .venv && . .venv/bin/activate && pip install --upgrade pip >/dev/null && pip install -r requirements.txt >/dev/null && pytest -q'
      - bash -euo pipefail -c 'cd devbox-app/frontend && npm install && npm run build'

  app:devbox:docker:up:
    desc: "Levanta devbox-app con Docker Compose"
    cmds:
      - bash -euo pipefail -c 'cd devbox-app && [ -f .env ] || cp .env.example .env'
      - bash -euo pipefail -c 'cd devbox-app && docker compose up -d --build'

  app:devbox:docker:down:
    desc: "Baja devbox-app en Docker Compose"
    cmds:
      - bash -euo pipefail -c 'cd devbox-app && docker compose down -v'

  app:devbox:images:build:
    desc: "Build de imagenes backend/frontend con mismo TAG"
    cmds:
      - bash -euo pipefail -c 'RAW_TAG="{{.TAG}}"; [ -n "${RAW_TAG}" ] || RAW_TAG="local"; IMAGE_TAG="${RAW_TAG}"; source ./lib/core/semver.sh; if declare -F semver_to_image_tag >/dev/null 2>&1; then IMAGE_TAG="$(semver_to_image_tag "${RAW_TAG}")"; fi; docker build -t ghcr.io/ihexhubs/devbox-app-backend:${IMAGE_TAG} devbox-app/backend; echo "backend image tag: ${RAW_TAG} -> ${IMAGE_TAG}"'
      - bash -euo pipefail -c 'RAW_TAG="{{.TAG}}"; [ -n "${RAW_TAG}" ] || RAW_TAG="local"; IMAGE_TAG="${RAW_TAG}"; source ./lib/core/semver.sh; if declare -F semver_to_image_tag >/dev/null 2>&1; then IMAGE_TAG="$(semver_to_image_tag "${RAW_TAG}")"; fi; docker build -t ghcr.io/ihexhubs/devbox-app-frontend:${IMAGE_TAG} devbox-app/frontend; echo "frontend image tag: ${RAW_TAG} -> ${IMAGE_TAG}"'

  app:devbox:gitops:pin-tag:
    desc: "Pin de tag compartido en overlay minikube usando toolset (sin scripts duplicados)"
    cmds:
      - bash -euo pipefail -c 'TAG="{{.TAG}}"; [ -n "${TAG}" ] || TAG="local"; IMAGE_TAG="${TAG}"; source ./lib/core/utils.sh; source ./lib/core/semver.sh; source ./lib/promote/workflows/to-local/10-utils.sh; source ./lib/promote/workflows/to-local/50-k8s.sh; if declare -F semver_to_image_tag >/dev/null 2>&1; then IMAGE_TAG="$(semver_to_image_tag "${TAG}")"; fi; promote_local_update_kustomize_tag "devbox-app/gitops/overlays/minikube/kustomization.yaml" "${IMAGE_TAG}"; uniq_count="$(awk "/^[[:space:]]*newTag:[[:space:]]*/ {print \\$2}" devbox-app/gitops/overlays/minikube/kustomization.yaml | sort -u | wc -l | tr -d "[:space:]")"; [ "${uniq_count}" = "1" ] || die "newTag desalineados en overlay minikube"; echo "Pinned overlay tag: ${TAG} -> ${IMAGE_TAG}"'

  app:devbox:minikube:deploy:
    desc: "Build + load + pin tag + apply overlay minikube"
    cmds:
      - bash -euo pipefail -c 'TAG="{{.TAG}}"; [ -n "${TAG}" ] || TAG="local"; task app:devbox:images:build TAG=${TAG}'
      - bash -euo pipefail -c 'RAW_TAG="{{.TAG}}"; [ -n "${RAW_TAG}" ] || RAW_TAG="local"; IMAGE_TAG="${RAW_TAG}"; source ./lib/core/semver.sh; if declare -F semver_to_image_tag >/dev/null 2>&1; then IMAGE_TAG="$(semver_to_image_tag "${RAW_TAG}")"; fi; minikube image load ghcr.io/ihexhubs/devbox-app-backend:${IMAGE_TAG}'
      - bash -euo pipefail -c 'RAW_TAG="{{.TAG}}"; [ -n "${RAW_TAG}" ] || RAW_TAG="local"; IMAGE_TAG="${RAW_TAG}"; source ./lib/core/semver.sh; if declare -F semver_to_image_tag >/dev/null 2>&1; then IMAGE_TAG="$(semver_to_image_tag "${RAW_TAG}")"; fi; minikube image load ghcr.io/ihexhubs/devbox-app-frontend:${IMAGE_TAG}'
      - bash -euo pipefail -c 'TAG="{{.TAG}}"; [ -n "${TAG}" ] || TAG="local"; task app:devbox:gitops:pin-tag TAG=${TAG}'
      - bash -euo pipefail -c 'kubectl apply -k devbox-app/gitops/overlays/minikube'

  app:devbox:argocd:deploy:
    desc: "Set tag compartido + aplicar Application + sync opcional por argocd CLI"
    cmds:
      - bash -euo pipefail -c 'REV="{{.REV}}"; [ -n "${REV}" ] || REV="local"; task app:devbox:gitops:pin-tag TAG=${REV}'
      - bash -euo pipefail -c 'kubectl apply -f devbox-app/gitops/argocd/application.yaml'
      - bash -euo pipefail -c 'REV="{{.REV}}"; [ -n "${REV}" ] || REV="local"; if command -v argocd >/dev/null 2>&1; then argocd app set devbox-app --revision ${REV} && argocd app sync devbox-app; else echo "argocd CLI no instalado; cambia revision manualmente a ${REV}"; fi'
