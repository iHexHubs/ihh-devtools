name: devbox-app-release

on:
  push:
    tags:
      - "ihh-devtools-v*"

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: vars
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          IMAGE_TAG="${RAW_TAG/+build./-build.}"
          echo "raw_tag=${RAW_TAG}" >> "${GITHUB_OUTPUT}"
          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Using shared release tag: ${RAW_TAG}"
          if [ "${RAW_TAG}" != "${IMAGE_TAG}" ]; then
            echo "Sanitized image tag for OCI: ${IMAGE_TAG}"
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: devbox-app/backend
          push: true
          tags: ghcr.io/ihexhubs/devbox-app-backend:${{ steps.vars.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: devbox-app/frontend
          push: true
          tags: ghcr.io/ihexhubs/devbox-app-frontend:${{ steps.vars.outputs.tag }}
