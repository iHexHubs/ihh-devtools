apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devbox-app

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - backend-deploy.yaml
  - frontend-deploy.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: devbox-app
