version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: devbox-app-db
    environment:
      POSTGRES_DB: ${DB_NAME:-devbox}
      POSTGRES_USER: ${DB_USER:-devbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devbox}
    volumes:
      - devbox_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devbox} -d ${DB_NAME:-devbox}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: devbox-app-backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: devbox-app-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  devbox_pgdata:
