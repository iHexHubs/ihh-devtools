flow_id: devbox-shell
adoption_mode: hibrida
primary_validation_tool: Bats
contract_file: specs/contracts/devbox-shell/interface-contract.yaml
checks:
  - name: contract-env-bootstrap
    tool: devbox
    purpose: expose the repo-local shell environment needed by the contract suite
    required: true
    command: devbox shell --print-env
  - name: devbox-shell-contract-bats
    tool: Bats
    purpose: validate help, print-env, contract resolution, profile wiring and readiness guards
    required: true
    command: bash tests/contracts/devbox-shell/run-contract-checks.sh
specmatic:
  enabled: false
  contract_file: none
  role: no_aplica
  reason: no honest Specmatic-supported sub-boundary was identified for the shell-local workflow
compatibility:
  enabled: true
  rules_file: specs/contracts/devbox-shell/compatibility-rules.yaml
coverage_notes:
  complete:
    - help surface for `devbox shell`
    - print-env surface exposing `DEVBOX_ENV_NAME=IHH`
    - repo contract resolution for `vendor_dir` and `profile_file`
  partial:
    - readiness gating checks are structural and do not replace a full PTY execution
    - wizard full path with live credentials is not executed
  out_of_scope:
    - role menu UX and final prompt
    - live GH/SSH repair and persistent local mutations
failure_conditions:
  - `devbox shell --help` fails or stops exposing the supported shell flags
  - `devbox shell --print-env` fails or stops exposing `DEVBOX_ENV_NAME=IHH`
  - repo contract resolution stops returning `.devtools` for vendor_dir or `./.git-acprc` for profile_file
  - readiness guards disappear from `shell.init_hook`
