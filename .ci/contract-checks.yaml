flow_id: devbox-shell
adoption_mode: hybrid
primary_validation_tool: bats
contract_file: specs/contracts/devbox-shell/interface-contract.yaml
checks:
  - name: devbox-shell-contract-bats
    tool: bats
    purpose: validate strict gate semantics, print-env export surface and common.sh consumer traceability
    command: devbox run -- bats tests/contracts/devbox-shell/devbox-shell-contract.bats
    required: true
    contract_sources:
      - specs/contracts/devbox-shell/assertions/cli-contract.yaml
      - specs/contracts/devbox-shell/interface-contract.yaml
      - specs/contracts/devbox-shell/compatibility-rules.yaml
specmatic:
  enabled: false
  role: no_aplica
  contract_file: none
  reason: main CLI/shell boundary has no honest direct dialect in Specmatic and no supported sub-boundary was materialized for this run
coverage:
  real:
    - strict gate structural semantics
    - non-interactive print-env export surface
    - common.sh fallback traceability
  partial:
    - full interactive tty session with live GH and SSH verification
    - prompt rendering details
  out_of_scope:
    - Devbox/Nix internals outside the observable boundary
failure_conditions:
  - the bats contract suite fails
  - the declared no-aplica Specmatic scope changes without revising the contract tree
  - coverage is presented as complete while remaining partial
