# Registro de apps para builds/control (fuente única)
# Convenciones:
# - path y artifact_paths son relativos a la raíz del repo, salvo que se indique lo contrario.
# - <tag> representa el tag completo (ej: pmbok-v1.2.3, ihh-v1.2.3)

apps:
  - id: pmbok
    path: apps/pmbok
    build_mode: native
    build_matrix:
      local: native
      act: native
    build_cmd_local: task -d apps/pmbok ci
    build_cmd_act: task -d apps/pmbok ci
    artifact_paths:
      - apps/pmbok/backend
      - apps/pmbok/frontend/dist
    zip_name_pattern: "<tag>.zip"
    components:
      - id: pmbok-backend
        path: apps/pmbok/backend
        build_mode: native
        build_matrix:
          local: native
          act: native
        build_cmd_local: "task -d apps/pmbok/backend install-ci && task -d apps/pmbok/backend test"
        build_cmd_act: "task -d apps/pmbok/backend install-ci && task -d apps/pmbok/backend test"
      - id: pmbok-frontend
        path: apps/pmbok/frontend
        build_mode: native
        build_matrix:
          local: native
          act: native
        build_cmd_local: "task -d apps/pmbok/frontend install-ci && task -d apps/pmbok/frontend test"
        build_cmd_act: "task -d apps/pmbok/frontend install-ci && task -d apps/pmbok/frontend test"

  - id: erd
    path: apps/erd/mobile
    build_mode: native
    build_matrix:
      local: native
      act: light
    build_cmd_local: ./gradlew assemble
    build_cmd_act: ./gradlew lint
    artifact_paths:
      - build/outputs
    zip_name_pattern: "<tag>.zip"
