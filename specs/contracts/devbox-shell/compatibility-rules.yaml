flow_id: devbox-shell
compatibility_promise: preserve the observable devbox shell contract and the print-env subboundary for current consumers while allowing internal refactors
compatible_changes:
  - add non-breaking exports or helper metadata
  - enrich welcome messages or prompt styling without hiding readiness state
  - refactor wizard internals while preserving gate semantics
  - expand contract test coverage without redefining the main boundary
breaking_changes:
  - remove or invalidate the repo-controlled devbox shell entry semantics
  - bypass or invert the strict gate when marker plus tty path applies
  - stop exposing print-env usable by common.sh to run git-cliff
  - force an unsupported contract dialect as canonical contract
  - hide relevant side effects or coverage limits as if they were neutral
checks_expected:
  - bats structural check for strict gating semantics
  - bats dynamic check for print-env exports
  - bats traceability check for common.sh fallback
  - review of declared partial coverage and no-aplica specmatic scope
notes:
  - side effects local/global remain visible and are not redefined as neutral behavior
  - contract coverage is intentionally partial
