flow_id: devbox-shell
compatibility_promise: >
  Consumers may continue treating `devbox shell --print-env` as the repo's
  contractual environment boundary and may continue expecting strict readiness
  gating when the variant requires wizard verification.
compatible_changes:
  - add non-breaking exports without removing protected ones
  - add contractual examples or assertions without changing the main boundary
  - extend the Bats suite without weakening existing guarantees
breaking_changes:
  - remove --print-env from the protected CLI surface
  - remove help visibility for --print-env, --config or --env
  - remove DEVBOX_ENV_NAME=IHH as the base exported value
  - remove DEVBOX_PROJECT_ROOT from the protected exported surface
  - bypass the strict readiness gate
  - hardcode .devtools/.git-acprc as the canonical profile target
checks_expected:
  - bats:help-flags
  - bats:print-env-base
  - bats:contract-resolver
  - bats:wizard-profile-wiring
  - bats:init-hook-readiness
notes:
  - The legacy file .devtools/.git-acprc may coexist as a seam, but it is not the canonical contractual target.

