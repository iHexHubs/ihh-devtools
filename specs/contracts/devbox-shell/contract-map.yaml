flow_id: devbox-shell
adoption_mode: hibrida
canonical_contract:
  type: shell-local-workflow-manifest
  file: specs/contracts/devbox-shell/interface-contract.yaml
  executable: false
executable_contract:
  type: none
  file: none
interface_contract: specs/contracts/devbox-shell/interface-contract.yaml
consumer_needs: specs/contracts/devbox-shell/consumer-needs.yaml
compatibility_rules: specs/contracts/devbox-shell/compatibility-rules.yaml
examples_dir: specs/contracts/devbox-shell/examples
schemas_dir: specs/contracts/devbox-shell/schemas
assertions_dir: specs/contracts/devbox-shell/assertions
tests_contracts_dir: tests/contracts/devbox-shell
ci_contract_checks: .ci/contract-checks.yaml
primary_validation_tool: Bats
specmatic_scope:
  enabled: false
  role: no_aplica
  contract_file: none
  reason: main boundary is a shell-local CLI workflow and no Specmatic-supported sub-boundary was identified without degrading that boundary
coverage_scope:
  complete:
    - help surface for `devbox shell`
    - print-env surface exposing the base repo environment
    - repo contract resolution for `vendor_dir` and `profile_file`
  partial:
    - readiness gating semantics represented through structural guard checks on `shell.init_hook`
    - contract-to-profile wiring between `setup-wizard.sh` and `step-04-profile.sh`
  out_of_scope:
    - full interactive PTY session
    - live GH/SSH authentication
    - persistent side effects executed against real local state
