flow_id: devbox-shell
adoption_mode: hibrida
contract_type: shell-local-workflow-manifest
canonical_contract_file: specs/contracts/devbox-shell/interface-contract.yaml
contract_file: none
primary_validation_tool: Bats
provider: ihh-devtools repo
consumers:
  - interactive repo operator
  - non-interactive inspector
boundary:
  type: shell local
  trigger: devbox shell
  entrypoint: devbox.json:shell.init_hook
  protected_surface:
    - repo-local shell bootstrap bound to the repo `devbox.json`
    - base environment exposure for the repo, including `DEVBOX_ENV_NAME=IHH`
    - conditional contextualization path through the setup wizard
    - repo contract resolution for `vendor_dir` and `profile_file`
  excluded_surface:
    - exact prompt, branding, role menu and alias count
    - full PTY UX with live credentials
    - internal candidate search layout
primary_validation_surface:
  - devbox shell --help
  - devbox shell --print-env
  - lib/core/contract.sh resolution of vendor_dir and profile_file
  - structural guards in devbox.json and setup-wizard/profile wiring
specmatic_scope:
  enabled: false
  role: no_aplica
  contract_file: none
  reason: no honest Specmatic-supported boundary or sub-boundary was identified for this shell-local workflow
compatibility_rules: specs/contracts/devbox-shell/compatibility-rules.yaml
examples_dir: specs/contracts/devbox-shell/examples
assertions_dir: specs/contracts/devbox-shell/assertions
coverage_notes:
  partial:
    - interactive readiness remains partially covered because the real PTY path depends on local credentials and runtime conditions
    - legacy `.devtools` artifacts remain visible in code and are tracked as compatibility constraints, not as normative contract
  out_of_scope:
    - live wizard full path with remote auth repair
