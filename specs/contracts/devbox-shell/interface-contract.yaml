flow_id: devbox-shell
adoption_mode: hybrid
contract_type: cli-shell-observable-contract
contract_file: specs/contracts/devbox-shell/assertions/cli-contract.yaml
canonical_executable_contract: tests/contracts/devbox-shell/devbox-shell-contract.bats
primary_contract_scope:
  boundary: devbox shell
  interface_type: cli-shell-local
  provider: repo-controlled shell contract in devbox.json, bin/setup-wizard.sh and core libs
  consumers:
    - interactive-operator
    - promote-changelog-fallback
primary_validation_tool: bats
primary_validation_entrypoint: tests/contracts/devbox-shell/devbox-shell-contract.bats
specmatic_scope:
  enabled: false
  role: no_aplica
  contract_file: none
  validates: []
  reason: no existe subfrontera materializada en dialecto soportado honestamente por Specmatic
non_specmatic_scope:
  validates:
    - gating observable de la variante estricta
    - resolucion contractual de root, vendor_dir y profile_file
    - export surface de devbox shell --print-env
    - trazabilidad del consumer common.sh
coverage_declared:
  real: partial
  summary: la validacion primaria cubre la frontera shell/CLI con alcance parcial y no pretende cubrir toda la UX interactiva
compatibility_rules: specs/contracts/devbox-shell/compatibility-rules.yaml
examples_dir: specs/contracts/devbox-shell/examples
schemas_dir: specs/contracts/devbox-shell/schemas
assertions_dir: specs/contracts/devbox-shell/assertions
