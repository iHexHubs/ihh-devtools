flow_id: devbox-shell
consumers:
  - name: interactive_repo_operator
    required_scenarios:
      - invoking `devbox shell` inside this repo opens a repo-local Devbox shell
      - the shell can attempt contextualization without asserting readiness universally
    required_fields:
      - repo `devbox.json`
      - `shell.init_hook`
      - `DEVBOX_ENV_NAME=IHH`
    tolerated_variations:
      - prompt text may change
      - role menu text may change
      - internal script lookup order may change
    unacceptable_breakages:
      - `devbox shell` no longer behaves as a repo-local entrypoint
      - readiness becomes unconditional
      - legacy artifacts silently override the repo contract
  - name: non_interactive_inspector
    required_scenarios:
      - invoking `devbox shell --help` exposes the supported shell flags
      - invoking `devbox shell --print-env` exposes the base repo environment
    required_fields:
      - `--print-env`
      - `--config`
      - `--env`
      - `DEVBOX_ENV_NAME=IHH`
    tolerated_variations:
      - extra exported variables may appear
      - print-env output order may change
    unacceptable_breakages:
      - `--print-env` disappears
      - base environment is missing from the print-env output
      - print-env is presented as proof of full interactive readiness
