flow_id: devbox-shell
assertions:
  - id: help-surface-stable
    protects: CLI help surface
    validation_tool: Bats
    validation_mode: executable
    statement: `devbox shell --help` must continue exposing the shell flags used by consumers, including `--print-env`
  - id: base-env-visible
    protects: base repo environment
    validation_tool: Bats
    validation_mode: executable
    statement: `devbox shell --print-env` must continue exposing `DEVBOX_ENV_NAME=IHH`
  - id: profile-file-contract-wins
    protects: repo contract authority
    validation_tool: Bats
    validation_mode: executable
    statement: `devtools_profile_config_file` must resolve to `<repo>/.git-acprc`
  - id: readiness-remains-conditional
    protects: conditional readiness semantics
    validation_tool: Bats
    validation_mode: executable_partial
    statement: `shell.init_hook` must keep verify-only and readiness guards instead of promoting unconditional readiness
  - id: print-env-is-not-full-readiness
    protects: anti false coverage discipline
    validation_tool: manual-boundary-limit
    validation_mode: declarative
    statement: `--print-env` is limited coverage and must not be treated as proof of the full interactive workflow
