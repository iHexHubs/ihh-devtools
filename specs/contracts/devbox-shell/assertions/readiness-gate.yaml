assertion: readiness-gate
protects:
  - strict variant must not report ready before wizard verification succeeds
applies_to:
  - devbox.json shell.init_hook
  - .devbox/gen/scripts/.hooks.sh
evidence_patterns:
  - DEVBOX_SESSION_READY=1
  - if [[ "$DEVTOOLS_SPEC_VARIANT" == "1" ]]; then DEVBOX_SESSION_READY=0; fi
  - if [ -f "$DT_ROOT/.setup_completed" ]; then WIZARD_ARGS="--verify-only"; fi
  - if [ ! -t 0 ] || [ ! -t 1 ]; then WIZARD_ARGS="--verify-only"; fi
  - se omite la ruta lista/contextualizada
validation:
  primary_tool: bats
  source_test: tests/contracts/devbox-shell/devbox-shell-contract.bats

