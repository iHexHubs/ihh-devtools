assertion: profile-resolution
protects:
  - wizard resolves the profile file through the repo contract
applies_to:
  - bin/setup-wizard.sh
  - lib/wizard/step-04-profile.sh
required_patterns:
  - PROFILE_CONFIG_FILE="$(devtools_profile_config_file "$REAL_ROOT" || true)"
  - export DEVTOOLS_WIZARD_RC_FILE="${PROFILE_CONFIG_FILE}"
  - local rc_file="${DEVTOOLS_WIZARD_RC_FILE:-.git-acprc}"
validation:
  primary_tool: bats
  source_test: tests/contracts/devbox-shell/devbox-shell-contract.bats

